services:
  - type: web
    name: mainha-assistant-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: SUPERVOZ_API_URL
        value: https://warllemedicao--supervoz-f5-gpu-fastapi-app.modal.run
      - key: SUPERVOZ_API_TOKEN
        sync: false
      - key: SUPERVOZ_VOICE
        value: warllem
      - key: SUPERVOZ_MODE
        value: balanced
      - key: SUPERVOZ_NFE_STEP
        value: "32"
      - key: SUPERVOZ_SPEED
        value: "1.0"
      - key: STT_PROVIDER
        value: frontend
      - key: REQUEST_TIMEOUT_SECONDS
        value: "120"
      - key: ASSISTANT_AUTH_TOKEN
        sync: false
